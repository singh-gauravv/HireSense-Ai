name: HireSense GitOps CI

on:
  push:
    branches:
      - main

jobs:

  build-and-update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set Image Tag
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/backend:${{ env.IMAGE_TAG }} \
          ./Backend

      - name: Push Backend
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/backend:${{ env.IMAGE_TAG }}

      - name: Build Frontend
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/frontend:${{ env.IMAGE_TAG }} \
          ./Frontend

      - name: Push Frontend
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/frontend:${{ env.IMAGE_TAG }}

      - name: Update Backend Manifest
        run: |
          sed -i "s|image: .*backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/backend:${{ env.IMAGE_TAG }}|g" k8s/manifests/backend-deployment.yaml

      - name: Update Frontend Manifest
        run: |
          sed -i "s|image: .*frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/frontend:${{ env.IMAGE_TAG }}|g" k8s/manifests/frontend-deployment.yaml

      - name: Commit Manifest Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add k8s/

          git commit -m "Update image tags to ${{ env.IMAGE_TAG }}" || exit 0

          git push