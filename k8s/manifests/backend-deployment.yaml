apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: hiresense

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: singhhgauravv/backend:5ca3605
        imagePullPolicy: Always

        ports:
        - containerPort: 3000

        env:
        - name: PORT
          value: "3000"

        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: MONGO_URI

        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: JWT_SECRET

        - name: GOOGLE_GENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: GOOGLE_GENAI_API_KEY

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5

        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5